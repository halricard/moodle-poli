# HTTP -> HTTPS redirect
<VirtualHost *:80>
    ServerName moodle.localhost
    RewriteEngine On
    RewriteRule ^/?(.*) https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>

# HTTPS vhost serving Moodle
<VirtualHost *:443>
    ServerName moodle.localhost
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile    /etc/apache2/certs/moodle.localhost.pem
    SSLCertificateKeyFile /etc/apache2/certs/moodle.localhost-key.pem

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
