services:
  db:
    image: mysql:8.4
    container_name: moodle_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-file-per-table=1
      - --transaction-isolation=READ-COMMITTED
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  moodle:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
        NODE_VERSION: ${NODE_VERSION:-22}
        MOODLE_HOST: ${MOODLE_HOST:-moodle.localhost}
    image: moodle-dev:local
    container_name: moodle_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./moodle:/var/www/html
      - ./moodledata:/var/www/moodledata
      - ./docker/certs:/etc/apache2/certs:ro

  cron:
    image: moodle-dev:local
    container_name: moodle_cron
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      moodle:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./moodle:/var/www/html
      - ./moodledata:/var/www/moodledata
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        while true; do
          if [ -f /var/www/html/config.php ]; then
            php /var/www/html/admin/cli/cron.php >/dev/null 2>&1 || true
          fi
          sleep 60
        done

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: moodle_pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      UPLOAD_LIMIT: 2G
    ports:
      - "${PMA_PORT:-8081}:80"

  mailpit:
    image: axllent/mailpit:latest
    container_name: moodle_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
